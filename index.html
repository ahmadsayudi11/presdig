<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PresDig SMK MIFTAHUL HIKMAH</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 480px;
            padding: 25px;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #eef2f5;
            padding-bottom: 15px;
        }
        .header h1 {
            font-size: 22px;
            color: #1e3a8a;
            margin-bottom: 5px;
        }
        .header p {
            font-size: 13px;
            color: #6b7280;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: #4b5563;
        }
        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }
        .camera-box {
            width: 100%;
            background-color: #f3f4f6;
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            overflow: hidden;
            text-align: center;
            position: relative;
            margin-bottom: 15px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        video, canvas {
            width: 100%;
            height: auto;
            display: none;
            border-radius: 6px;
        }
        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 10px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }
        .btn-primary {
            background-color: #2563eb;
            color: white;
        }
        .btn-primary:hover {
            background-color: #1d4ed8;
        }
        .btn-success {
            background-color: #10b981;
            color: white;
        }
        .btn-success:hover {
            background-color: #059669;
        }
        .btn-secondary {
            background-color: #6b7280;
            color: white;
            font-size: 14px;
            padding: 10px;
        }
        .btn-secondary:hover {
            background-color: #4b5563;
        }
        .btn-danger {
            background-color: #ef4444;
            color: white;
            font-size: 13px;
            padding: 8px;
            margin-top: 5px;
        }
        .status-location {
            font-size: 12px;
            color: #059669;
            margin-top: 5px;
            font-weight: 500;
        }
        .admin-section {
            margin-top: 30px;
            border-top: 2px dashed #e5e7eb;
            padding-top: 20px;
            display: none;
        }
        .admin-toggle {
            text-align: center;
            margin-top: 20px;
            cursor: pointer;
            color: #9ca3af;
            font-size: 12px;
            text-decoration: underline;
        }
        .loading {
            display: none;
            text-align: center;
            color: #2563eb;
            font-weight: 600;
            margin: 10px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>PresDig SMK MIFTAHUL HIKMAH</h1>
        <p>Sistem Presensi Digital Berbasis GPS & Face Capture</p>
    </div>

    <div id="loading" class="loading">Sedang memproses, mohon tunggu...</div>

    <form id="attendanceForm" onsubmit="prosesPresensiNormal(event)">
        <div class="form-group">
            <label for="nip">NIP / Kode Staff</label>
            <input type="text" id="nip" class="form-control" placeholder="Masukkan NIP Anda" required>
        </div>

        <div class="form-group">
            <label for="kategori">Kategori Kehadiran</label>
            <select id="kategori" class="form-control" required>
                <option value="Masuk">Masuk Kerja</option>
                <option value="Pulang">Pulang Tugas</option>
            </select>
        </div>

        <div class="form-group">
            <label>Ambil Foto Wajah</label>
            <div class="camera-box" id="cameraBox">
                <span id="cameraPlaceholder">Kamera belum aktif</span>
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas"></canvas>
            </div>
            <button type="button" class="btn btn-secondary" id="btnAktifkanKamera" onclick="inisialisasiKamera()">Buka Kamera</button>
            <button type="button" class="btn btn-success" id="btnAmbilFoto" onclick="tangkapFoto()" style="display:none;">Ambil Foto</button>
            <button type="button" class="btn btn-danger" id="btnResetFoto" onclick="resetKamera()" style="display:none;">Foto Ulang</button>
        </div>

        <div class="form-group">
            <label>Lokasi GPS</label>
            <div id="statusGps" class="status-location">Mendeteksi lokasi koordinat...</div>
        </div>

        <button type="submit" class="btn btn-primary" id="btnKirim">Kirim Presensi (WA Otomatis)</button>
    </form>

    <button class="btn btn-secondary" style="background-color: #f59e0b; margin-top: 15px;" onclick="absenBypass()">
        ⚠️ Jalur Darurat (Bypass Gateway)
    </button>

    <div class="admin-toggle" onclick="togglePanelAdmin()">Buka Pengaturan URL & PIN Admin</div>

    <div class="admin-section" id="adminPanel">
        <h3 style="font-size: 14px; margin-bottom: 10px; color: #1f2937;">Konfigurasi Sistem Admin</h3>
        
        <div class="form-group">
            <label style="font-size: 12px;">URL Web App Google Script</label>
            <input type="text" id="webAppUrl" class="form-control" style="font-size: 12px; padding: 8px;" placeholder="https://script.google.com/macros/s/.../exec">
        </div>

        <div class="form-group">
            <label style="font-size: 12px;">PIN Admin (Untuk Bypass & Pengaturan)</label>
            <input type="password" id="id-input-pin-pengaturan" class="form-control" style="font-size: 12px; padding: 8px;" placeholder="Masukkan PIN Baru">
        </div>
        
        <button type="button" class="btn btn-success" style="font-size: 13px; padding: 8px;" onclick="simpanPengaturanAdmin()">Simpan Pengaturan</button>
    </div>
</div>

<script>
    let latitude = "";
    let longitude = "";
    let base64ImageString = "";
    let streamObj = null;

    // Membuka konfigurasi otomatis saat halaman dimuat
    window.onload = function() {
        if (localStorage.getItem('webAppUrl')) {
            document.getElementById('webAppUrl').value = localStorage.getItem('webAppUrl');
        }
        if (localStorage.getItem('pinAdmin')) {
            document.getElementById('id-input-pin-pengaturan').value = localStorage.getItem('pinAdmin');
        } else {
            document.getElementById('id-input-pin-pengaturan').value = "2026"; // PIN Default pertama
        }
        dapatkanLokasiGps();
    };

    function simpanPengaturanAdmin() {
        const urlValue = document.getElementById('webAppUrl').value.trim();
        const pinValue = document.getElementById('id-input-pin-pengaturan').value.trim();

        if(!urlValue || !pinValue) {
            alert("URL Web App dan PIN Admin tidak boleh kosong!");
            return;
        }

        localStorage.setItem('webAppUrl', urlValue);
        localStorage.setItem('pinAdmin', pinValue);
        alert("Pengaturan Berhasil Disimpan! PIN Bypass otomatis berubah mengikuti PIN baru Anda.");
        document.getElementById('adminPanel').style.display = 'none';
    }

    function togglePanelAdmin() {
        const panel = document.getElementById('adminPanel');
        if (panel.style.display === 'block') {
            panel.style.display = 'none';
        } else {
            const pinSesuai = document.getElementById('id-input-pin-pengaturan').value.trim();
            const konfirmasiPin = prompt("Masukkan PIN Admin saat ini:");
            if (konfirmasiPin === pinSesuai) {
                panel.style.display = 'block';
            } else if (konfirmasiPin !== null) {
                alert("PIN Salah! Akses ditolak.");
            }
        }
    }

    function dapatkanLokasiGps() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    latitude = position.coords.latitude.toString();
                    longitude = position.coords.longitude.toString();
                    document.getElementById('statusGps').innerText = `📍 Terkunci: ${latitude}, ${longitude}`;
                    document.getElementById('statusGps').style.color = "#059669";
                }, 
                function(error) {
                    document.getElementById('statusGps').innerText = "⚠️ Gagal mendeteksi koordinat GPS.";
                    document.getElementById('statusGps').style.color = "#ef4444";
                },
                { enableHighAccuracy: true }
            );
        }
    }

    async function inisialisasiKamera() {
        document.getElementById('cameraPlaceholder').innerText = "Mengaktifkan kamera...";
        try {
            streamObj = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
            const video = document.getElementById('video');
            video.srcObject = streamObj;
            video.style.display = 'block';
            document.getElementById('cameraPlaceholder').style.display = 'none';
            document.getElementById('btnAktifkanKamera').style.display = 'none';
            document.getElementById('btnAmbilFoto').style.display = 'inline-flex';
        } catch (err) {
            alert("Gagal membuka kamera: " + err.message);
        }
    }

    function tangkapFoto() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        base64ImageString = canvas.toDataURL('image/jpeg');

        video.style.display = 'none';
        canvas.style.display = 'block';

        if (streamObj) {
            streamObj.getTracks().forEach(track => track.stop());
        }
        document.getElementById('btnAmbilFoto').style.display = 'none';
        document.getElementById('btnResetFoto').style.display = 'inline-flex';
    }

    function resetKamera() {
        document.getElementById('canvas').style.display = 'none';
        base64ImageString = "";
        inisialisasiKamera();
        document.getElementById('btnResetFoto').style.display = 'none';
    }

    // =======================================================
    // LOGIKA KRITIKAL: VALIDASI PIN DARURAT SECARA DINAMIS
    // =======================================================
    function absenBypass() {
        // Membaca input nilai PIN dari setting admin secara real-time
        const elemenPinAdmin = document.getElementById('id-input-pin-pengaturan'); 
        const pinAdminSkrg = elemenPinAdmin ? elemenPinAdmin.value.trim() : "2026"; 
        
        // Meminta PIN
        const inputUser = prompt("Fitur Dikecualikan. Masukkan PIN Admin:");
        
        if (inputUser === null) return; // Klik Batal
        
        if (inputUser === pinAdminSkrg) {
            alert("PIN Valid! Mengirim data presensi bypass ke database...");
            eksekusiKirimKeGoogleScript(true);
        } else {
            alert("PIN Salah! Jalur darurat diblokir.");
        }
    }

    function prosesPresensiNormal(event) {
        event.preventDefault();
        if(!base64ImageString) {
            alert("Wajib mengambil foto wajah terlebih dahulu!");
            return;
        }
        eksekusiKirimKeGoogleScript(false);
    }

    function eksekusiKirimKeGoogleScript(isBypassActive) {
        const urlTarget = document.getElementById('webAppUrl').value.trim();
        const nipValue = document.getElementById('nip').value.trim();
        const kategoriValue = document.getElementById('kategori').value;

        if (!urlTarget) {
            alert("Error: URL Web App Google Script belum diisi di halaman admin!");
            return;
        }

        document.getElementById('loading').style.display = 'block';
        document.getElementById('btnKirim').disabled = true;

        const payloadData = {
            nip: nipValue,
            kategori: kategoriValue,
            lat: latitude || "0.0",
            lng: longitude || "0.0",
            image: base64ImageString,
            bypass: isBypassActive
        };

        fetch(urlTarget, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payloadData)
        })
        .then(() => {
            alert(`Sukses! Presensi NIP ${nipValue} (${kategoriValue}) berhasil dicatat.`);
            document.getElementById('nip').value = "";
            resetKamera();
            document.getElementById('canvas').style.display = 'none';
            document.getElementById('video').style.display = 'none';
            document.getElementById('cameraPlaceholder').style.display = 'block';
            document.getElementById('cameraPlaceholder').innerText = "Kamera belum aktif";
            document.getElementById('btnAktifkanKamera').style.display = 'inline-flex';
            document.getElementById('btnResetFoto').style.display = 'none';
        })
        .catch(err => {
            alert("Gagal mengirim data: " + err.toString());
        })
        .finally(() => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('btnKirim').disabled = false;
        });
    }
</script>

</body>
</html>
