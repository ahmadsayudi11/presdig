<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor QR Code Presdig SMK MIFTAHUL HKMAH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col items-center justify-center text-white p-4 font-sans">
    <div class="bg-white text-slate-900 p-8 rounded-3xl shadow-2xl max-w-md w-full text-center space-y-6 border border-slate-700">
        <div>
            <h1 class="text-xl font-extrabold tracking-tight text-purple-900">GURU & STAFF SMK MIFTAHUL HIKMAH</h1>
            <h1 class="text-xl font-extrabold tracking-tight text-purple-900">SCAN QR CODE UNTUK ABSEN</h1>
            <p class="text-xs font-semibold text-slate-400 mt-1 uppercase tracking-wider">Dynamic QR Code Terminal</p>
        </div>
        
        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex justify-center">
            <div id="qrcode" class="p-2 bg-white rounded-xl shadow-inner"></div>
        </div>
        
        <div class="space-y-2">
            <div class="h-1.5 w-full bg-slate-100 rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-purple-700 w-full transition-all duration-1000 linear"></div>
            </div>
            <p id="timer" class="text-xs font-bold text-purple-700">Memperbarui token dalam 30 detik...</p>
        </div>
    </div>

    <script>
        const salt = "KunciRahasiaSMK123";
        const qrContainer = document.getElementById("qrcode");
        let countdown = 30;
        const progressBar = document.getElementById("progress-bar");
        const timerText = document.getElementById("timer");

        function generateQR() {
            const sekarang = new Date();
            const formatWaktu = sekarang.getFullYear() + 
                String(sekarang.getMonth() + 1).padStart(2, '0') + 
                String(sekarang.getDate()).padStart(2, '0') + 
                String(sekarang.getHours()).padStart(2, '0') + 
                String(sekarang.getMinutes()).padStart(2, '0');
            
            const token = CryptoJS.SHA256(formatWaktu + salt).toString();
            qrContainer.innerHTML = "";
            new QRCode(qrContainer, { text: token, width: 240, height: 240 });
            countdown = 30;
        }

        generateQR();
        
        setInterval(() => {
            countdown--;
            if (countdown <= 0) {
                generateQR();
            }
            timerText.innerText = `Memperbarui token dalam ${countdown} detik...`;
            progressBar.style.width = `${(countdown / 30) * 100}%`;
        }, 1000);
    </script>
</body>
</html>
